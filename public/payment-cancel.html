
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VanillaSMP Payment</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png">
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#7b2fff">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{
  --black:#04030a;--panel:#11172f;--panel2:#16213e;--line:#2a2a4a;
  --purple:#7b2fff;--purple2:#a855f7;--gold:#ffd700;--gold2:#ffaa00;
  --emerald:#00ff88;--emerald2:#00cc6a;--red:#ff2244;--blue:#00aaff;
  --white:#f2f0ff;--muted:#9ba1c6;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{
  min-height:100vh;
  font-family:'Press Start 2P',monospace;
  color:var(--white);
  background:#04030a;
  overflow-x:hidden;
  image-rendering:pixelated;
}
.bg{
  position:fixed;inset:0;z-index:0;overflow:hidden;
  background:
    radial-gradient(circle at 72% 22%, rgba(168,85,247,.28), transparent 32%),
    radial-gradient(circle at 18% 78%, rgba(0,170,255,.18), transparent 34%),
    radial-gradient(circle at 50% 55%, rgba(255,215,0,.08), transparent 24%),
    linear-gradient(180deg,#03020a 0%,#080719 50%,#03040a 100%);
}
.bg:before{
  content:"";position:absolute;inset:-40px;opacity:.42;
  background-image:
    radial-gradient(1px 1px at 10% 20%,#fff 98%,transparent),
    radial-gradient(1px 1px at 32% 12%,#a9c4ff 98%,transparent),
    radial-gradient(2px 2px at 48% 30%,#fff 98%,transparent),
    radial-gradient(1px 1px at 76% 18%,#ffd98a 98%,transparent),
    radial-gradient(1px 1px at 90% 60%,#fff 98%,transparent),
    radial-gradient(1px 1px at 20% 75%,#b58cff 98%,transparent),
    radial-gradient(2px 2px at 64% 82%,#fff 98%,transparent);
  background-size:240px 180px;
  animation:stars 28s linear infinite;
}
.bg:after{
  content:"";position:absolute;inset:0;
  background:
    linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px),
    radial-gradient(circle at center,transparent 40%,rgba(0,0,0,.52) 100%);
  background-size:18px 18px,18px 18px,100% 100%;
}
.nebula{
  position:absolute;width:70vw;height:70vw;border-radius:50%;filter:blur(38px);opacity:.42;
  background:conic-gradient(from 120deg,rgba(123,47,255,.7),rgba(0,170,255,.35),rgba(255,215,0,.15),rgba(123,47,255,.7));
  left:58%;top:10%;transform:translate(-50%,-50%);
  animation:neb 18s ease-in-out infinite;
}
@keyframes stars{to{transform:translate3d(-240px,180px,0)}}
@keyframes neb{50%{transform:translate(-48%,-46%) scale(1.08) rotate(8deg)}}
.wrap{position:relative;z-index:2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:42px 18px}
.shell{width:min(1080px,100%);display:grid;grid-template-columns:1.05fr .95fr;gap:22px;align-items:stretch}
.panel{
  background:rgba(17,23,47,.92);
  border:4px solid var(--purple);
  box-shadow:8px 8px 0 #000,0 0 38px rgba(123,47,255,.45);
  position:relative;padding:28px;
}
.panel:before,.panel:after{content:"";position:absolute;width:18px;height:18px;background:#04030a}
.panel:before{left:-4px;top:-4px}.panel:after{right:-4px;bottom:-4px}
.logo{
  text-align:center;font-size:clamp(17px,3.6vw,32px);line-height:1.65;letter-spacing:3px;margin-bottom:18px;
}
.logo .yellow{color:var(--gold);text-shadow:3px 3px 0 #7a4400,0 0 20px rgba(255,215,0,.75)}
.logo .purple{color:var(--purple2);text-shadow:3px 3px 0 #3d1780,0 0 20px rgba(168,85,247,.75)}
.logo .store{display:block;color:#f4f0ff;text-shadow:3px 3px 0 #4b4384,0 0 22px rgba(244,240,255,.55);letter-spacing:6px}
.badge{
  width:max-content;max-width:100%;margin:0 auto 22px;padding:10px 14px;
  border:2px solid var(--emerald);color:var(--emerald);
  background:rgba(0,255,136,.08);font-size:8px;line-height:1.8;text-align:center;
  box-shadow:0 0 16px rgba(0,255,136,.3)
}
.badge.warn{border-color:var(--gold2);color:var(--gold);background:rgba(255,170,0,.08);box-shadow:0 0 16px rgba(255,170,0,.28)}
.badge.bad{border-color:var(--red);color:var(--red);background:rgba(255,34,68,.08);box-shadow:0 0 16px rgba(255,34,68,.28)}
.title{font-size:13px;color:var(--gold);line-height:1.7;margin-bottom:14px;text-shadow:2px 2px 0 #6d3d00}
.text{font-size:9px;color:var(--muted);line-height:2.05}
.order-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0}
.tile{
  background:rgba(4,3,10,.62);border:3px solid var(--line);padding:16px;min-height:92px;
}
.label{font-size:7px;color:var(--muted);letter-spacing:2px;margin-bottom:10px}
.value{font-size:11px;line-height:1.8;color:var(--white);word-break:break-word}
.value.big{font-size:23px;color:var(--gold);text-shadow:2px 2px 0 #7a4400,0 0 20px rgba(255,215,0,.6)}
.steps{display:grid;gap:12px;margin-top:18px}
.step{display:grid;grid-template-columns:42px 1fr;gap:12px;align-items:start;background:rgba(4,3,10,.38);border:2px solid var(--line);padding:12px}
.step-num{
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  background:var(--purple);color:#fff;font-size:10px;box-shadow:3px 3px 0 #1e0c40
}
.step h3{font-size:9px;color:var(--white);margin-bottom:7px}
.step p{font-size:8px;color:var(--muted);line-height:1.8}
.actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:22px}
.btn{
  font-family:'Press Start 2P',monospace;cursor:pointer;text-decoration:none;text-align:center;border:0;
  padding:15px 18px;font-size:9px;line-height:1.6;display:inline-block;transition:.08s;min-width:190px
}
.btn:active{transform:translateY(3px)}
.btn-pay{
  background:var(--emerald2);color:#001a0d;
  border-top:4px solid var(--emerald);border-left:4px solid var(--emerald);
  border-bottom:4px solid #006633;border-right:4px solid #006633;
  box-shadow:4px 4px 0 #003318,0 0 26px rgba(0,255,136,.5)
}
.btn-back{
  background:var(--purple);color:#fff;
  border-top:4px solid var(--purple2);border-left:4px solid var(--purple2);
  border-bottom:4px solid #3d1780;border-right:4px solid #3d1780;
  box-shadow:4px 4px 0 #1e0c40,0 0 22px rgba(123,47,255,.5)
}
.btn-red{
  background:var(--red);color:#fff;
  border-top:4px solid #ff6677;border-left:4px solid #ff6677;
  border-bottom:4px solid #880011;border-right:4px solid #880011;
  box-shadow:4px 4px 0 #440008,0 0 22px rgba(255,34,68,.5)
}
.note{margin-top:18px;font-size:8px;color:var(--muted);line-height:2;text-align:center}
pre{white-space:pre-wrap;word-break:break-word;background:#04030a;border:2px solid var(--line);padding:12px;font-size:8px;line-height:1.7;color:#b8bfd8;max-height:170px;overflow:auto}
.loader{width:32px;height:32px;margin:24px auto;border:4px solid var(--line);border-top-color:var(--emerald);animation:spin 1s steps(8) infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.icon{
  font-size:54px;text-align:center;margin:4px 0 18px;filter:drop-shadow(0 0 16px rgba(255,215,0,.42))
}
.side-card{height:100%;display:flex;flex-direction:column;justify-content:space-between}
.debug-wrap{margin-top:16px}
@media(max-width:900px){.shell{grid-template-columns:1fr}.side-card{min-height:auto}.order-grid{grid-template-columns:1fr}.btn{width:100%}}
</style>
</head>

<body>
<div class="bg"><div class="nebula"></div></div>
<div class="wrap">
  <main class="panel" style="width:min(850px,100%)">
    <div class="logo"><span class="yellow">VANILLA</span><span class="purple">SMP</span><span class="store">CANCELLED</span></div>
    <div class="icon">❌</div>
    <div class="badge bad">PAYMENT CANCELLED OR FAILED</div>
    <div class="tile">
      <div class="label">WHAT HAPPENED?</div>
      <div class="value">The payment was not completed. You can return to the store and try again.</div>
    </div>
    <div class="actions">
      <a class="btn btn-red" href="/">BACK TO STORE</a>
      <a class="btn btn-back" href="https://discord.gg/6BZf7naQKR" target="_blank" rel="noopener noreferrer">ASK SUPPORT</a>
    </div>
  </main>
</div>
</body>
</html>
