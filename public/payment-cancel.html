<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VanillaSMP Payment Cancelled</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{min-height:100vh;margin:0;background:radial-gradient(circle at 70% 20%,rgba(255,34,68,.18),transparent 30%),linear-gradient(180deg,#04030a,#080719);color:#f2f0ff;font-family:'Press Start 2P',monospace;display:flex;align-items:center;justify-content:center;padding:24px}
.panel{width:min(820px,100%);background:rgba(17,23,47,.94);border:4px solid #ff2244;box-shadow:8px 8px 0 #000,0 0 40px rgba(255,34,68,.35);padding:34px;text-align:center}
.logo{font-size:clamp(18px,4vw,34px);line-height:1.6;margin-bottom:18px}.yellow{color:#ffd700}.purple{color:#a855f7}.store{display:block;color:#fff}
.badge{display:inline-block;border:2px solid #ff2244;color:#ff2244;background:rgba(255,34,68,.08);padding:12px 16px;font-size:8px;line-height:1.8;margin:18px 0}
.text{font-size:9px;line-height:2;color:#9ba1c6}.btn{display:inline-block;margin-top:22px;text-decoration:none;background:#7b2fff;color:#fff;padding:16px 18px;font-size:9px;border-top:4px solid #a855f7;border-left:4px solid #a855f7;border-bottom:4px solid #3d1780;border-right:4px solid #3d1780;box-shadow:4px 4px 0 #1e0c40}
</style>
</head>
<body>
<main class="panel">
  <div class="logo"><span class="yellow">VANILLA</span><span class="purple">SMP</span><span class="store">CANCELLED</span></div>
  <div style="font-size:58px">❌</div>
  <div class="badge">PAYMENT CANCELLED</div>
  <div class="text">The payment was not completed. You can return to the store and try again.</div>
  <a class="btn" href="/">BACK TO STORE</a>
</main>
</body>
</html>
