<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test Checkout</title>
</head>
<body style="background:#080812;color:white;font-family:Arial;padding:40px">
  <h1>TEST CHECKOUT</h1>
  <pre id="info">Loading...</pre>
  <button onclick="pay()" style="padding:12px">TEST PAY & ISSUE</button>

  <script>
    const id = new URLSearchParams(location.search).get("order");

    async function load() {
      const res = await fetch("/api/order/" + id);
      const data = await res.json();
      document.getElementById("info").textContent = JSON.stringify(data, null, 2);
    }

    async function pay() {
      const res = await fetch("/api/test-pay/" + id, { method: "POST" });
      const data = await res.json();
      document.getElementById("info").textContent = JSON.stringify(data, null, 2);
    }

    load();
  </script>
</body>
</html>
